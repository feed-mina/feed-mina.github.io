---
layout: default
---
<article class="wrap post-layout">
  <p class="kicker">{{ page.category | default: "Tech Note" }}</p>
  <h1>{{ page.title }}</h1>
  <div class="post-meta">
    <time datetime="{{ page.date | date_to_xmlschema }}">{{ page.date | date: "%Y.%m.%d" }}</time>
    {% for tag in page.tags %}
      <span>#{{ tag }}</span>
    {% endfor %}
  </div>
  <div class="post-content">
    {{ content }}
  </div>
</article>
